<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guessing Game</title>
<style>
body{
    font-family:Arial;
    text-align:center;
    margin-top:50px;
}
button{
    padding:10px;
}
</style>
</head>
<body>
<h1>Guess the Number</h1>
<p>Pick a number from 1-100</p>
<input id="guess">
<button onclick="checkGuess()">Guess</button>
<p id="result"></p>
<script>
const secret = Math.floor(Math.random()*100)+1;
function checkGuess(){
let guess = Number(document.getElementById("guess").value);
if(guess < secret){
document.getElementById("result").innerHTML = "Too low!";
}
else if(guess > secret){
document.getElementById("result").innerHTML = "Too high!";
}
else{
document.getElementById("result").innerHTML = "You got it!";
}
}
</script>
<p>
<a href="scratch.html">Back to Scratch Page</a>
</p>
</body>
</html>
